<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixo Custo - Sem Ligação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="text-center bg-white p-8 rounded-3xl shadow-lg border border-gray-100 max-w-sm mx-4">
        <div class="w-20 h-20 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-wifi text-3xl"></i>
            <div class="absolute w-24 h-1 bg-white transform rotate-45"></div> <!-- Strikethrough effect -->
        </div>
        <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Sem ligação à internet</h1>
        <p class="text-gray-500 mb-8 text-sm">Parece que estás offline. Verifica a tua ligação à rede e tenta novamente.</p>
        <button onclick="window.location.reload()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md w-full">
            Tentar novamente
        </button>
    </div>
</body>
</html>
