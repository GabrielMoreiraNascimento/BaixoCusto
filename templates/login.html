<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixo Custo - Entrar</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white border border-gray-200 rounded-3xl p-8 shadow-xl">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-indigo-900 tracking-wider">BAIXO CUSTO</h2>
            <p class="text-sm text-gray-500 mt-1">Insere os teus dados para entrar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for categoria, msg in messages %}
                <div class="mb-4 p-3 rounded-xl text-center text-xs font-semibold border {{ 'bg-green-100 text-green-700 border-green-200' if categoria == 'sucesso' else 'bg-red-100 text-red-700 border-red-200' }}">
                    {{ msg }}
                </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">E-mail</label>
                <input type="email" name="email" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Palavra-passe</label>
                <input type="password" name="senha" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors text-sm">Entrar na Plataforma</button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-500">Ainda não tens uma conta? <a href="/registo" class="text-indigo-600 font-bold hover:underline">Regista-te aqui</a></p>
        </div>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registado!', reg))
                    .catch(err => console.error('Falha no registo do Service Worker', err));
            });
        }
    </script>
</body>
</html>
